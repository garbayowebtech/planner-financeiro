[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HTML: nunca cachear — garante que o usuário sempre receba a versão mais recente
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS: cachear por 1 ano — o ?v= no index.html força o download quando atualizado
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS: cachear por 1 ano — o ?v= no index.html força o download quando atualizado
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
